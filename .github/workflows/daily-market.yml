name: Daily Market Report

on:
  schedule:
    - cron: "0 16 * * *"   # 16:00 UTC every day
  workflow_dispatch:         # manual trigger

permissions:
  contents: write

jobs:
  market-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run market agent
        env:
          GUMROAD_ID: ${{ secrets.GUMROAD_ID }}
          GUMROAD_SECRET: ${{ secrets.GUMROAD_SECRET }}
        run: python -m agent.market_agent

      - name: Commit report
        run: |
          git config user.name "solarpunk-bot"
          git config user.email "bot@solarpunk.market"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily market report $(date -u +%Y-%m-%d)"
            git push
          fi
